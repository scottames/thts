[tools]
"aqua:goreleaser/goreleaser" = "2.15.4"
"aqua:int128/ghcp" = "1.15.3"
go = "1.26.3"
trunk = "1.3.4"

[tasks.build]
run = "go build -o thts ./cmd/thts"

[tasks.test]
run = "go test ./..."

[tasks.test-integration]
run = "go test -tags=integration ./internal/cmd/..."

[tasks.test-all]
depends = ["test"]
run = "go test -tags=integration ./internal/cmd/..."

[tasks.test-coverage]
run = """
go test -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html
"""

[tasks.lint]
run = "trunk check"

[tasks.lint-fix]
run = "trunk check --fix && trunk fmt"

[tasks.check]
depends = ["lint", "test", "test-integration"]

[tasks.install]
run = "go install ./cmd/thts"

[tasks.install_local]
run = "go build -o ~/.local/bin/thts ./cmd/thts"

[tasks.clean]
run = "rm -f thts coverage.out coverage.html"
