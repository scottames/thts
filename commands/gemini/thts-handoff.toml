description = "Create handoff document for session continuity"

prompt = """
# Create Handoff

Create a handoff document to transfer context to another session.

## Process

### 1. Gather Metadata

Run these commands to collect context:

- `git branch --show-current` - current branch
- `git rev-parse HEAD` - current commit
- `git status --short` - uncommitted changes
- `date -Iseconds` - current timestamp

### 2. Create Handoff Document

Write to: `thoughts/shared/handoffs/YYYY-MM-DD_HH-MM-SS_description.md`

Use this structure:

```markdown
---
date: [ISO timestamp with timezone]
author: [your name]
branch: [current branch]
commit: [current commit hash]
---

# Handoff: [Brief Description]

## Task(s)

[Description of tasks and their status: completed, in progress, or planned]

## Critical References

[2-3 most important files/documents that must be read to continue]

## Recent Changes

[Files modified in this session with file:line references]

## Key Learnings

[Non-obvious discoveries, patterns, gotchas - things the next session needs to know]

## Artifacts

[Files created or updated: plans, research, code]

## Next Steps

[Prioritized list of what to do next]

## Notes

[Anything else relevant that doesn't fit above]
```

### 3. Sync

Run `thts sync` to save the handoff.

### 4. Respond

Tell the user:

```text
Handoff created and synced. Resume with:

/thts-resume thoughts/shared/handoffs/YYYY-MM-DD_HH-MM-SS_description.md
```
"""
